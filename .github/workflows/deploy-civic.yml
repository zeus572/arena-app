name: Deploy Civic Arena

on:
  push:
    branches: [release]
    paths:
      - 'backend-civic/**'
      - 'frontend-civic/**'
      - 'shared/**'
      - '.github/workflows/deploy-civic.yml'
      - 'infra/civic.bicep'
  workflow_dispatch:

jobs:
  deploy-backend-civic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore & Publish
        working-directory: backend-civic
        run: dotnet publish -c Release -o ./publish

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.CIVIC_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_CIVIC }}
          package: backend-civic/publish

  deploy-frontend-civic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend-civic/package-lock.json

      - name: Install & Build
        working-directory: frontend-civic
        env:
          VITE_CIVIC_API_URL: ${{ secrets.VITE_CIVIC_API_URL }}
          VITE_ARENA_API_URL: ${{ secrets.VITE_ARENA_API_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CIVIC }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend-civic/dist
          output_location: ''
          skip_app_build: true
